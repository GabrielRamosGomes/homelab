---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Media:
    - Filebrowser:
        href: {{HOMEPAGE_VAR_FILEBROWSER_URL}}
        description: Web based file manager.
        icon: filebrowser
        container: filebrowser
        widget:
          type: filebrowser
          url: {{HOMEPAGE_VAR_FILEBROWSER_URL}}
          username: {{HOMEPAGE_VAR_FILEBROWSER_USER}}
          password: {{HOMEPAGE_VAR_FILEBROWSER_PASSWORD}}

    - Metube:
        href: {{HOMEPAGE_VAR_METUBE_URL}}
        description: Youtube Downloader.
        icon: metube
        container: metube

    - ConvertX:
        href: {{HOMEPAGE_VAR_CONVERTX_URL}}
        description: Media converter.
        icon: convertx
        container: convertx

- Management:    
    - Dockhand:
        href: {{HOMEPAGE_VAR_DOCKHAND_URL}}
        description: Docker management UI.
        icon: dockhand
        container: dockhand
        widget:
          type: dockhand
          url: {{HOMEPAGE_VAR_DOCKHAND_URL}}
          username: {{HOMEPAGE_VAR_DOCKHAND_USER}}
          password: {{HOMEPAGE_VAR_DOCKHAND_PASSWORD}}
    
    - Uptime Kuma:
        href: {{HOMEPAGE_VAR_UPTIME_KUMA_URL}}
        description: Uptime monitoring.
        icon: uptime-kuma
        container: uptime-kuma
        widget:
          type: uptimekuma
          url: {{HOMEPAGE_VAR_UPTIME_KUMA_URL}}
          slug: homelab
    
    - Vaultwarden:
        href: {{HOMEPAGE_VAR_VAULTWARDEN_URL}}
        description: Password manager.
        icon: vaultwarden
        container: vaultwarden

- Network:
    - AdGuard:
        href: {{HOMEPAGE_VAR_ADGUARD_URL}}
        description: DNS and adblocking.
        icon: adguard-home
        container: adguardhome
        widget:
          type: adguard
          url: {{HOMEPAGE_VAR_ADGUARD_URL}}
          username: {{HOMEPAGE_VAR_ADGUARD_USER}}
          password: {{HOMEPAGE_VAR_ADGUARD_PASSWORD}}

    - Speedtest Tracker:
        href: {{HOMEPAGE_VAR_SPEEDTEST_TRACKER_URL}}
        description: Internet speed monitoring.
        icon: speedtest-tracker
        container: speedtest-tracker
        widget:
          type: speedtest
          url: {{HOMEPAGE_VAR_SPEEDTEST_TRACKER_URL}}
          version: 2
          key: {{HOMEPAGE_VAR_SPEEDTEST_TRACKER_API_KEY}}

    - UGREEN DH2300:
        href: {{HOMEPAGE_VAR_NAS_URL}}
        description: NAS management interface.
        icon: sh-ugreen-nas

    - Tailscale:
        href: https://login.tailscale.com/admin/machines
        description: Tailscale admin panel.
        icon: tailscale
        # widget:
        #   type: tailscale
        #   deviceid: {{HOMEPAGE_VAR_TS_DEVICE_ID}}
        #   url: https://login.tailscale.com/admin/machines
        #   key: {{HOMEPAGE_VAR_TS_API_KEY}}


# JELLYFIN STUFF

- Jellyfin Media:
    - Jellyfin:
        href: {{HOMEPAGE_VAR_JELLYFIN_URL}}
        description: Media server.
        icon: jellyfin
        container: jellyfin
        widget:
            type: jellyfin
            url: {{HOMEPAGE_VAR_JELLYFIN_URL}}
            key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
            version: 2
            enableBlocks: true
            enableNowPlaying: false
            enableUser: false
            showEpisodeNumber: false

    - Seerr:
        href: {{HOMEPAGE_VAR_SEERR_URL}}
        description: Request management.
        icon: seerr
        container: seerr
        widget:
          type: seerr
          url: {{HOMEPAGE_VAR_SEERR_URL}}
          key: {{HOMEPAGE_VAR_SEERR_API_KEY}}

- Collection Management:
    - Radarr:
        href: {{HOMEPAGE_VAR_RADARR_URL}}
        description: Movie collection manager.
        icon: radarr
        container: radarr
        widget:
          type: radarr
          url: {{HOMEPAGE_VAR_RADARR_URL}}
          key: {{HOMEPAGE_VAR_RADARR_API_KEY}}
          fields:
            - wanted
            - queued
            - movies
    
    - Sonarr:
        href: {{HOMEPAGE_VAR_SONARR_URL}}
        description: TV show collection manager.
        icon: sonarr
        container: sonarr
        widget:
          type: sonarr
          url: {{HOMEPAGE_VAR_SONARR_URL}}
          key: {{HOMEPAGE_VAR_SONARR_API_KEY}}
          fields:
            - wanted
            - queued
            - series

    - Sonarr Anime:
        href: {{HOMEPAGE_VAR_SONARR_ANIME_URL}}
        description: Anime collection manager.
        icon: sonarr
        container: sonarr-anime
        widget:
          type: sonarr
          url: {{HOMEPAGE_VAR_SONARR_ANIME_URL}}
          key: {{HOMEPAGE_VAR_SONARR_ANIME_API_KEY}}

    - Bazarr:
        href: {{HOMEPAGE_VAR_BAZARR_URL}}
        description: Subtitle management.
        icon: bazarr
        container: bazarr
        widget:
          type: bazarr
          url: {{HOMEPAGE_VAR_BAZARR_URL}}
          key: {{HOMEPAGE_VAR_BAZARR_API_KEY}}

- Downloads & Indexers:
    - qBittorrent:
        href: {{HOMEPAGE_VAR_QBITTORRENT_URL}}
        description: Torrent downloads.
        icon: qbittorrent
        container: qbittorrent
        widget:
          type: qbittorrent
          url: {{HOMEPAGE_VAR_QBITTORRENT_URL}}
          username: {{HOMEPAGE_VAR_QBITTORRENT_USER}}
          password: {{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}
          enableLeechProgress: true
          enableLeechSize: true

    - Prowlarr:
        href: {{HOMEPAGE_VAR_PROWLARR_URL}}
        description: Indexer management.
        icon: prowlarr
        container: prowlarr
        widget:
          type: prowlarr
          url: {{HOMEPAGE_VAR_PROWLARR_URL}}
          key: {{HOMEPAGE_VAR_PROWLARR_API_KEY}}

- Releases:
    - Release Calendar:
        icon: mdi-calendar-month
        description: Upcoming movies, TV, and anime.
        widget:
          type: calendar
          view: agenda
          maxEvents: 12
          showTime: true
          previousDays: 1
          integrations:
            - type: radarr
              service_group: Collection Management
              service_name: Radarr
              color: amber
              baseUrl: {{HOMEPAGE_VAR_RADARR_URL}}
              params:
                unmonitored: false

            - type: sonarr
              service_group: Collection Management
              service_name: Sonarr
              color: sky
              baseUrl: {{HOMEPAGE_VAR_SONARR_URL}}
              params:
                unmonitored: false

            - type: sonarr
              service_group: Collection Management
              service_name: Sonarr Anime
              color: violet
              baseUrl: {{HOMEPAGE_VAR_SONARR_ANIME_URL}}
              params:
                unmonitored: false