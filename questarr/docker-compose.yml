x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment: &common-env
    PUID: ${PUID}
    PGID: ${PGID}
    TZ: ${TZ}

services:
  questarr:
    <<: *common-keys
    image: ghcr.io/doezer/questarr:latest
    container_name: ${SERVICE}
    volumes:
      - ./${SERVICE}-data:/app/data
      - /mnt/nas/filebrowser/Games:/data/games
    restart: unless-stopped
    labels:
      - "docktail.service.enable=true"
      - "docktail.service.name=${SERVICE}"
      - "docktail.service.port=5000"
      - "docktail.service.protocol=http"
      - "docktail.service.service-protocol=https"

  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent-games
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - 8081:8080
      - 6882:6882
      - 6882:6882/udp
    environment:
      <<: *common-env
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/qbittorrent-games:/config
      - /mnt/nas/filebrowser/Games:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: questarr_network