x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment: &common-env
    PUID: ${PUID}
    PGID: ${PGID}
    TZ: ${TZ}

services:
  qbittorrent: # Downloads
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      <<: *common-env
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/qbittorrent:/config
      - /mnt/nas/jellyfin/data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  radarr: # Movies
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - 7878:7878
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/radarr:/config
      - /mnt/nas/jellyfin/data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:7878/ping || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  sonarr: # TV Shows
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - 8989:8989
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/sonarr:/config
      - /mnt/nas/jellyfin/data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8989/ping || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  sonarr-anime: # Anime
    <<: *common-keys
    container_name: sonarr-anime
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - 8990:8989
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/sonarr-anime:/config
      - /mnt/nas/jellyfin/data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8989/ping || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  bazarr: # Subtitles
    <<: *common-keys
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - 6767:6767
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/bazarr:/config
      - /mnt/nas/jellyfin/data:/data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:6767 || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  prowlarr: # Indexers
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - 9696:9696
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/prowlarr:/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9696/ping || exit 1
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  jellyfin: # Media Server
    <<: *common-keys
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/nas/jellyfin/config:/config
      - /mnt/nas/jellyfin/data/media:/data/media:ro
    labels:
      - "docktail.service.enable=true"
      - "docktail.service.name=jellyfin"
      - "docktail.service.port=8096"
      - "docktail.service.service-protocol=https"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8096/health || exit 1
      start_period: 40s
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - proxy_network

  seerr: # Request Management
    <<: *common-keys
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    environment:
      <<: *common-env
      LOG_LEVEL: info
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/seerr:/app/config
    labels:
      - "docktail.service.enable=true"
      - "docktail.service.name=seerr"
      - "docktail.service.port=5055"
      - "docktail.service.service-protocol=https"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: false
      CAPTCHA_SOLVER: none
      TZ: ${TZ}
    expose:
      - 8191

  recyclarr: # TRaSH Guides sync for Radarr/Sonarr
    <<: *common-keys
    container_name: recyclarr
    image: ghcr.io/recyclarr/recyclarr:8
    user: ${PUID}:${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/recyclarr:/config


networks:
  default:
    name: arr_network
  proxy_network:
    external: true